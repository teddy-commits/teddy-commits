[build]
  command = "npm run build"
  publish = "dist"

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: Make admin route even more secure
[[redirects]]
  from = "/teddybrothedeveloper"
  to = "/index.html"
  status = 200
  force = true

# Prevent crawlers from indexing admin page (optional)
[[headers]]
  for = "/teddybrothedeveloper"
  [headers.values]
    X-Robots-Tag = "noindex"